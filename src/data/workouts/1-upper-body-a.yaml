name: Mon - Upper Body A
description: "Required: kettlebells, dumbbells, bench."

plan:

  # --- Warm-up ---
  - include: warm-ups/warm-up-2.yaml

  # ===== MAIN CIRCUIT (3 ROUNDS) =====

  # --- Set 1 ---
  - &set1
    - step: { exercise_id: dumbbell-bench-press, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, label: "b + 5 + 1.25", weight: 14.5kg}
    - step: { exercise_id: rest, duration_s: 50 }

    - step: { exercise_id: dumbbell-row-bench-single, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, weight: KB16kg }
    - step: { exercise_id: dumbbell-row-bench-single, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, weight: KB16kg, image_flip: true }
    - step: { exercise_id: rest, duration_s: 50 }

    # - step: { exercise_id: dumbbell-lateral-rises, reps: { prep_s: 10, reps_num: 6, rep_duration_s: 4 }, label: "b + 2.5 ", weight: 7kg}
    - step: { exercise_id: dumbbell-lateral-rises, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, weight: 6kg}
    - step: { exercise_id: rest, duration_s: 50 }

    - step: { exercise_id: dumbbell-shoulder-press, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, label: "b + 2.5 + 1.25", weight: 9.5kg}
    - step: { exercise_id: rest, duration_s: 50 }

    - step: { exercise_id: dumbbell-bicep-curl, reps: { prep_s: 10, reps_num: 10, rep_duration_s: 4 }, label: "b + 2.5 + 1.25", weight: 9.5kg}
    - step: { exercise_id: rest, duration_s: 50 }

    - step: { exercise_id: dumbbell-bench-fly, reps: { prep_s: 10, reps_num: 8, rep_duration_s: 4 }, label: "b + 2.5 + 1.25", weight: 9.5kg}
    #- step: { exercise_id: dumbbell-bench-fly, reps: { prep_s: 10, reps_num: 15, rep_duration_s: 4 }, label: "hex", weight: 7.5kg}
    - step: { exercise_id: rest, duration_s: 50 }
    
    - step: { exercise_id: push-ups-diamond, reps: { prep_s: 10, reps_num: 8, rep_duration_s: 3 } }

  # --- Set 2 (repeat) ---
  - step: { exercise_id: rest, duration_s: 90 }
  - *set1

  # --- Set 3 (repeat) ---
  - step: { exercise_id: rest, duration_s: 90 }
  - *set1

  # --- Cooldown ---
  - step: { exercise_id: rest, duration_s: 30 }
  - step: { exercise_id: biceps-dynamic-stretch, duration_s: 25 }
  - step: { exercise_id: stretch-arm-wall, label: "R", duration_s: 25  }
  - step: { exercise_id: stretch-arm-wall, label: "L", image_flip: true, duration_s: 25  }
  - step: { exercise_id: stretch-bicep-wall, label: "R", duration_s: 25  }
  - step: { exercise_id: stretch-bicep-wall, label: "L", image_flip: true, duration_s: 25  }
  - step: { exercise_id: stretch-shoulders-static-wall, duration_s: 25 }

